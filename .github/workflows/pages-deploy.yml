name: "Build and Deploy"
on:
  repository_dispatch:
    types: [RUN_WORKFLOW_DISPATCH]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  importer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean Directory
        run: |
          for file in assets/img/*
          do
              if [[ $file != "assets/img/favicons" ]]
              then
                  rm -rf "$file"
              fi
          done
          rm -rf _posts/*

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install

      - run: node _scripts/notion-import.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}

      - name: Commit and push with rebase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "mlee0323"
          git config user.email "minseoklee0323@gmail.com"
          sleep 5
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[배포] Notion 변경 사항 저장"
            git pull --rebase --autostash origin main
            git push origin main
          fi

  build:
    needs: importer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest from importer
        run: git pull origin main

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install system packages for building gems
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip tar xz-utils build-essential libstdc++6 ca-certificates pkg-config libffi-dev libssl-dev zlib1g-dev

      - name: Clean bundle cache
        run: rm -rf vendor/bundle

      - name: Bundle install
        run: bundle config set --local deployment 'true' && bundle install --jobs 4 --retry 3 --path vendor/bundle

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Test site
        run: |
          # 최신 html-proofer 옵션 적용: --allow-hash-href
          bundle exec htmlproofer _site --disable-external --check-html --allow-hash-href

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
